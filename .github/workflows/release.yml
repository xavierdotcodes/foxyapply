name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # macOS — build, package .app, codesign, notarize, zip
  # ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PyInstaller bot binary
        run: |
          pip install -r requirements.txt
          pyinstaller --onefile --name easyapplybot easyapplybot.py
          mkdir -p build/darwin/resources
          cp dist/easyapplybot build/darwin/resources/

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build + package .app bundle
        run: wails3 task darwin:package

      - name: Codesign
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          # Skip signing if secrets are not configured
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate configured — skipping codesign"
            exit 0
          fi

          echo "$MACOS_CERTIFICATE" | base64 -d > certificate.p12
          security create-keychain -p "$MACOS_CERTIFICATE_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CERTIFICATE_PASSWORD" build.keychain

          # Sign bot binary first
          BOT="bin/foxyapply.app/Contents/Resources/easyapplybot"
          if [ ! -f "$BOT" ]; then
            BOT="build/darwin/resources/easyapplybot"
          fi
          if [ -f "$BOT" ]; then
            codesign --force --options runtime --timestamp -s "$MACOS_SIGN_IDENTITY" "$BOT" -v
          fi

          # Sign the .app bundle
          codesign --force --deep --options runtime --timestamp \
            -s "$MACOS_SIGN_IDENTITY" \
            "bin/foxyapply.app" -v
          codesign --verify --deep --strict --verbose=2 "bin/foxyapply.app"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No Apple ID configured — skipping notarization"
            exit 0
          fi

          ditto -c -k --sequesterRsrc --keepParent "bin/foxyapply.app" "bin/FoxyApply-macOS.zip"

          SUBMIT_JSON="$(xcrun notarytool submit "bin/FoxyApply-macOS.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"
          echo "$SUBMIT_JSON"

          STATUS="$(echo "$SUBMIT_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))')"
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed: $STATUS"
            exit 1
          fi

          # Staple with retries for CloudKit propagation
          for i in 1 2 3 4 5; do
            if xcrun stapler staple "bin/foxyapply.app"; then break; fi
            echo "Staple attempt $i failed, retrying..."
            sleep $((i*10))
          done

          # Re-zip with stapled ticket
          rm -f "bin/FoxyApply-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "bin/foxyapply.app" "bin/FoxyApply-macOS.zip"

      - name: Create zip (unsigned fallback)
        run: |
          if [ ! -f "bin/FoxyApply-macOS.zip" ]; then
            ditto -c -k --sequesterRsrc --keepParent "bin/foxyapply.app" "bin/FoxyApply-macOS.zip"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: bin/FoxyApply-macOS.zip

  # ──────────────────────────────────────────────────────────────────
  # Windows — build + NSIS installer
  # ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PyInstaller bot binary
        run: |
          pip install -r requirements.txt
          pyinstaller --onefile --name easyapplybot easyapplybot.py
          mkdir -p build/windows/resources
          cp dist/easyapplybot.exe build/windows/resources/

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build + create NSIS installer
        run: wails3 task windows:package

      - name: Rename installer
        run: |
          $nsis = Get-ChildItem -Path "build/windows/nsis" -Filter "*installer*" -Recurse | Select-Object -First 1
          if ($nsis) {
            Copy-Item $nsis.FullName "bin/FoxyApply-Windows-Setup.exe"
          } else {
            Copy-Item "bin/foxyapply.exe" "bin/FoxyApply-Windows-Setup.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: bin/FoxyApply-Windows-Setup.exe

  # ──────────────────────────────────────────────────────────────────
  # Linux — build + AppImage
  # ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PyInstaller bot binary
        run: |
          pip install -r requirements.txt
          pyinstaller --onefile --name easyapplybot easyapplybot.py
          mkdir -p build/linux/resources
          cp dist/easyapplybot build/linux/resources/

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Build + create AppImage
        run: wails3 task linux:create:appimage

      - name: Rename AppImage
        run: |
          APPIMAGE=$(find bin/ -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "bin/FoxyApply-Linux.AppImage"
          else
            cp bin/foxyapply "bin/FoxyApply-Linux.AppImage"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: bin/FoxyApply-Linux.AppImage

  # ──────────────────────────────────────────────────────────────────
  # Create GitHub Release with all assets
  # ──────────────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "FoxyApply $TAG" \
            --generate-notes \
            artifacts/release-macos/FoxyApply-macOS.zip \
            artifacts/release-windows/FoxyApply-Windows-Setup.exe \
            artifacts/release-linux/FoxyApply-Linux.AppImage
