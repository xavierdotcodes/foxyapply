name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
          - os: windows-latest
            goos: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build PyInstaller bot binary
        run: |
          pip install -r requirements.txt
          pyinstaller --onefile --name easyapplybot easyapplybot.py

      - name: Bundle bot binary (Linux)
        if: matrix.goos == 'linux'
        run: |
          mkdir -p build/linux/resources
          cp dist/easyapplybot build/linux/resources/

      - name: Bundle bot binary (Windows)
        if: matrix.goos == 'windows'
        run: |
          mkdir -p build/windows/resources
          cp dist/easyapplybot.exe build/windows/resources/

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Build
        run: wails3 build

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.goos }}
          path: bin/
